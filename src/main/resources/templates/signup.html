<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Signup</title>
<style>
body {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background: linear-gradient(135deg, #6366f1, #3b82f6);
	font-family: Segoe UI;
}

.card {
	background: white;
	padding: 40px;
	border-radius: 12px;
	width: 320px;
	text-align: center;
}

input {
	width: 100%;
	padding: 10px;
	margin: 10px 0;
}

button {
	width: 100%;
	padding: 10px;
	background: #6366f1;
	color: white;
	border: none;
}

.back-btn {
	display: inline-block;
	margin-top: 15px;
	padding: 10px;
	width: 100%;
	text-align: center;
	border-radius: 6px;
	background: #e5e7eb;
	color: #1e293b;
	text-decoration: none;
	font-weight: 600;
	transition: 0.3s;
}

.back-btn:hover {
	background: #d1d5db;
}
</style>
</head>

<body>

	<div class="card">
		<h2>Create Account</h2>

		<form method="post" action="/signup">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" /> <input name="username"
				placeholder="Username" required> <input name="password"
				type="password" placeholder="Password">
			<button>Sign Up</button>
		</form>

		<p th:text="${error}" style="color: red;"></p>

		<a href="/login" class="back-btn">← Back to Login</a>
	</div>

</body>
</html>
