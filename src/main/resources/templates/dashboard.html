<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard</title>

<style>
body {
	font-family: Arial;
	margin: 0;
	background: #f1f5f9;
}

.navbar {
	background: #1e293b;
	color: white;
	padding: 15px;
	display: flex;
	justify-content: space-between;
}

.navbar button {
	margin-left: 10px;
	padding: 8px 12px;
	background: #3b82f6;
	border: none;
	color: white;
	border-radius: 5px;
}

.container {
	padding: 20px;
}

.card {
	background: white;
	padding: 20px;
	border-radius: 10px;
	box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
}

table {
	width: 100%;
	margin-top: 20px;
	border-collapse: collapse;
}

th, td {
	padding: 10px;
	text-align: center;
}

th {
	background: #3b82f6;
	color: white;
}
</style>

<script>
async function loadData() {
    const users = await fetch('/active-users').then(r=>r.json());
    document.getElementById('body').innerHTML =
        users.map(u=>`
        <tr>
            <td>${u.sessionId}</td>
            <td>${u.username}</td>
            <td>${new Date(u.loginTime).toLocaleString()}</td>
            <td>${new Date(u.lastAccessTime).toLocaleString()}</td>
        </tr>`).join('');
}
setInterval(loadData,3000);
window.onload=loadData;

function go(p){ location.href=p; }
</script>

</head>
<body>

	<div class="navbar">
		<div>
			Welcome, <b th:text="${username}"></b>
		</div>
		<div>
			<button onclick="go('/dashboard')">Dashboard</button>
			<button onclick="go('/admin')">Admin</button>

			<form method="post" action="/logout" style="display: inline;">
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<button>Logout</button>
			</form>
		</div>
	</div>

	<div class="container">

		<div class="card">
			<h3>Active Users</h3>

			<table>
				<thead>
					<tr>
						<th>Session</th>
						<th>User</th>
						<th>Login</th>
						<th>Last Access</th>
					</tr>
				</thead>
				<tbody id="body"></tbody>
			</table>

		</div>

	</div>

</body>
</html>
