<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard</title>

<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600&display=swap"
	rel="stylesheet">

<style>
body {
	font-family: 'Inter', sans-serif;
	margin: 0;
	background: #f1f5f9;
}

/* Headings look stylish */
h1, h2, h3 {
	font-family: 'Poppins', sans-serif;
	font-weight: 600;
	letter-spacing: 0.5px;
}

/* Navbar */
.navbar {
	background: #1e293b;
	color: white;
	padding: 15px;
	display: flex;
	justify-content: space-between;
	font-weight: 500;
	letter-spacing: 0.5px;
}

/* Buttons */
.navbar button {
	margin-left: 10px;
	padding: 8px 14px;
	background: #3b82f6;
	border: none;
	color: white;
	border-radius: 6px;
	font-weight: 500;
	cursor: pointer;
	transition: 0.3s;
}

.navbar button:hover {
	background: #2563eb;
}

/* Container */
.container {
	padding: 20px;
}

/* Card */
.card {
	background: white;
	padding: 20px;
	border-radius: 12px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
}

/* Table */
table {
	width: 100%;
	margin-top: 20px;
	border-collapse: collapse;
	font-size: 14px;
}

th, td {
	padding: 12px;
	text-align: center;
}

th {
	background: #3b82f6;
	color: white;
	font-weight: 600;
}

tr:nth-child(even) {
	background: #f8fafc;
}

tr:hover {
	background: #e2e8f0;
	transition: 0.2s;
}
</style>

<script>
async function loadData() {
    const users = await fetch('/active-users').then(r=>r.json());
    document.getElementById('body').innerHTML =
        users.map(u=>`
        <tr>
            <td>${u.sessionId}</td>
            <td>${u.username}</td>
            <td>${new Date(u.loginTime).toLocaleString()}</td>
            <td>${new Date(u.lastAccessTime).toLocaleString()}</td>
        </tr>`).join('');
}
setInterval(loadData,3000);
window.onload=loadData;

function go(p){ location.href=p; }
</script>

</head>
<body>

	<div class="navbar">
		<div>
			Welcome, <b th:text="${username}"></b>
		</div>
		<div>
			<button onclick="go('/dashboard')">Dashboard</button>
			<button onclick="go('/admin')">Admin</button>

			<form method="post" action="/logout" style="display: inline;">
				<input type="hidden" th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}" />
				<button>Logout</button>
			</form>
		</div>
	</div>

	<div class="container">

		<div class="card">
			<h3>Active Users</h3>

			<table>
				<thead>
					<tr>
						<th>Session</th>
						<th>User</th>
						<th>Login</th>
						<th>Last Access</th>
					</tr>
				</thead>
				<tbody id="body"></tbody>
			</table>

		</div>

	</div>

</body>
</html>
