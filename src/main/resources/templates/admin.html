<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#f1f5f9;
}

/* Navbar */
.navbar {
    background:#1e293b;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-left {
    display:flex;
    align-items:center;
    gap:15px;
}

.nav-right {
    display:flex;
    align-items:center;
    gap:10px;
}

.nav-btns a, .nav-btns button {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    text-decoration:none;
}

.nav-btns a:hover, .nav-btns button:hover {
    background:#2563eb;
}

.container {
    padding:25px;
}

.card {
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    color:white;
    padding:20px;
    border-radius:12px;
    width:250px;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.chart-box {
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Status */
.status {
    display:inline-block;
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:5px;
}

.active { background:#22c55e; }
.inactive { background:#ef4444; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th {
    background:#3b82f6;
    color:white;
}

th, td {
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f8fafc;
}

/* Modal */
.modal-overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-box {
    background:white;
    padding:25px;
    border-radius:12px;
    width:300px;
    text-align:center;
    animation:fadeInScale 0.3s ease;
}

@keyframes fadeInScale {
    from { transform:scale(0.8); opacity:0; }
    to { transform:scale(1); opacity:1; }
}

.modal-actions {
    margin-top:20px;
    display:flex;
    justify-content:space-between;
}

.btn {
    padding:8px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.cancel {
    background:#e5e7eb;
}

.cancel:hover {
    background:#d1d5db;
}

.confirm {
    background:#ef4444;
    color:white;
}

.confirm:hover {
    background:#dc2626;
}

@media(max-width:900px){
    .grid {
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">

    <div class="nav-left">
        <h2>📊 Admin Panel</h2>
        <span>👤 <b th:text="${username}"></b></span>
    </div>

    <div class="nav-right nav-btns">
        <a href="/dashboard">Dashboard</a>
        <a href="/admin">Admin</a>

        <button onclick="openModal()">Logout</button>
    </div>

</div>

<div class="container">

    <!-- Stats -->
    <div class="card">
        <p>Total Active Users</p>
        <h1 id="count">0</h1>
    </div>

    <!-- Charts -->
    <div class="grid">

        <div class="chart-box">
            <h3>Active Users Trend</h3>
            <canvas id="lineChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Session Status</h3>
            <canvas id="barChart"></canvas>
        </div>

    </div>

    <!-- Table -->
    <div class="chart-box">
        <h3>Active Users</h3>
        <table>
            <thead>
                <tr>
                    <th>Session ID</th>
                    <th>Username</th>
                    <th>Status</th>
                    <th>Login Time</th>
                    <th>Last Access</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

</div>

<!-- ✅ Logout Modal -->
<div id="logoutModal" class="modal-overlay">
    <div class="modal-box">
        <h3>Confirm Logout</h3>
        <p>Are you sure you want to logout?</p>

        <div class="modal-actions">
            <button class="btn cancel" onclick="closeModal()">Cancel</button>

            <form id="logoutForm" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn confirm">Logout</button>
            </form>
        </div>
    </div>
</div>

<script>
/* Modal */
function openModal(){
    document.getElementById("logoutModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("logoutModal").style.display = "none";
}

/* Charts */
let lineChart;
let barChart;

let timeLabels = [];
let activeCounts = [];

function initCharts(){
    const ctx1 = document.getElementById("lineChart").getContext("2d");
    const ctx2 = document.getElementById("barChart").getContext("2d");

    lineChart = new Chart(ctx1, {
        type: "line",
        data: {
            labels: timeLabels,
            datasets: [{
                label: "Active Users",
                data: activeCounts,
                borderColor: "#3b82f6",
                tension: 0.3
            }]
        }
    });

    barChart = new Chart(ctx2, {
        type: "bar",
        data: {
            labels: ["Active", "Inactive"],
            datasets: [{
                label: "Sessions",
                data: [0,0],
                backgroundColor: ["#22c55e","#ef4444"]
            }]
        }
    });
}

/* Load data */
async function loadData() {
    try {
        const users = await (await fetch('/active-users')).json();

        const active = users.filter(u => u.status === "ACTIVE").length;
        const inactive = users.filter(u => u.status === "INACTIVE").length;

        document.getElementById("count").innerText = active;

        // Table
        let rows = "";
        users.forEach(u => {
            rows += `<tr>
                <td>${u.sessionId}</td>
                <td>${u.username || '-'}</td>
                <td>
                    <span class="status ${u.status === 'ACTIVE' ? 'active' : 'inactive'}"></span>
                    ${u.status}
                </td>
                <td>${u.loginTime ? new Date(u.loginTime).toLocaleString() : '-'}</td>
                <td>${u.lastAccessTime ? new Date(u.lastAccessTime).toLocaleString() : '-'}</td>
            </tr>`;
        });

        document.getElementById("table").innerHTML = rows;

        // Trend
        const now = new Date().toLocaleTimeString();
        timeLabels.push(now);
        activeCounts.push(active);

        if(timeLabels.length > 10){
            timeLabels.shift();
            activeCounts.shift();
        }

        lineChart.update();

        // Bar
        barChart.data.datasets[0].data = [active, inactive];
        barChart.update();

    } catch (e) {
        console.error(e);
    }
}

window.onload = () => {
    initCharts();
    loadData();
    setInterval(loadData, 3000);
};
</script>

</body>
</html>
