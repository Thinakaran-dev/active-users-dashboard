<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Login</title>

<!-- Particles -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<!-- Lottie -->
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #111827, #000000);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    font-family:Segoe UI;
    overflow:hidden;
    color:#e5e7eb;
}

@keyframes gradientBG {
    0% { background-position:0% 50%; }
    50% { background-position:100% 50%; }
    100% { background-position:0% 50%; }
}

#particles-js {
    position:absolute;
    width:100%;
    height:100%;
}

.card {
    position:relative;
    z-index:1;
    padding:35px;
    border-radius:20px;
    width:340px;
    text-align:center;
    animation:fadeIn 1s ease;

    /* GLASS + COLOR */
    background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(147,51,234,0.25));
    backdrop-filter: blur(25px);

    /* GLOW BORDER */
    border: 1px solid rgba(255,255,255,0.15);

    /* NEON SHADOW */
    box-shadow:
        0 0 20px rgba(59,130,246,0.4),
        0 0 40px rgba(147,51,234,0.3),
        0 0 60px rgba(6,182,212,0.2);
}

.avatar {
    width:60px;
    height:60px;
    border-radius:50%;
    background: radial-gradient(circle, #6366f1, #3b82f6);
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
    margin:0 auto 10px;

    box-shadow: 0 0 20px #3b82f6;
}

input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    outline:none;

    background: rgba(255,255,255,0.08);
    color:#fff;

    border: 1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

input:focus {
    border:1px solid #38bdf8;
    box-shadow:0 0 10px #38bdf8;
}

.password-box {
    position:relative;
}

.eye {
    position:absolute;
    right:10px;
    top:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    color:#9ca3af;
}

.eye:hover {
    transform:scale(1.2);
    color:#38bdf8;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;

    background: linear-gradient(135deg, #6366f1, #3b82f6, #06b6d4);
    background-size:200%;

    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}

button:hover {
    background-position:right;
    box-shadow:0 0 15px #3b82f6;
    transform:scale(1.05);
}

/* Signup */
.signup-box {
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.signup-btn {
    display:inline-block;
    padding:10px 16px;
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:white;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}

.signup-btn:hover {
    transform:scale(1.05);
}

/* Loader */
.spinner {
    display:none;
    margin-top:10px;
    color:#38bdf8;
}

/* Strength text */
#strengthText {
    font-size:13px;
    margin-top:5px;
}
</style>

</head>

<body>

<div id="particles-js"></div>

<div class="card" id="card">

    <!-- Lottie -->
    <lottie-player 
        src="https://assets2.lottiefiles.com/packages/lf20_jcikwtux.json"
        background="transparent"
        speed="1"
        style="width:120px; height:120px; margin:auto;"
        loop autoplay>
    </lottie-player>

    <!-- Avatar -->
    <div class="avatar" id="avatar">👤</div>

    <h2>Login</h2>

    <form method="post" action="/login" autocomplete="off" onsubmit="showLoader()">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="text" id="username" name="username" placeholder="Username" required oninput="updateAvatar()">

        <div class="password-box">
            <input type="password" id="password" name="password" placeholder="Password" required>

            <span class="eye" id="icon">🐵</span>
        </div>

        <p id="strengthText"></p>

        <button type="submit">Login</button>

        <div class="spinner" id="spinner">⏳ Logging in...</div>
    </form>

    <p th:if="${param.error}" style="color:red;">Invalid username or password</p>

    <div class="signup-box">
        <p>Don't have an account?</p>
        <a href="/signup" class="signup-btn">Create Account</a>
    </div>

</div>

<script>
/* Avatar */
function updateAvatar(){
    const val = document.getElementById("username").value;
    document.getElementById("avatar").textContent =
        val ? val.charAt(0).toUpperCase() : "👤";
}

/* Loader */
function showLoader(){
    document.getElementById("spinner").style.display = "block";
}

/* Password strength */
function checkStrength(password) {
    let strength = 0;

    if (password.length >= 6) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    if (strength <= 1) return "weak";
    if (strength === 2 || strength === 3) return "medium";
    return "strong";
}

/* LIVE MONKEY + STRENGTH */
let typingTimer;
const doneTypingInterval = 800;

const passwordInput = document.getElementById("password");
const icon = document.getElementById("icon");
const strengthText = document.getElementById("strengthText");

passwordInput.addEventListener("input", () => {

    const value = passwordInput.value;

    // While typing → monkey covers eyes
    icon.textContent = "🙈";

    // Strength check
    const strength = checkStrength(value);

    if (strength === "weak") {
        strengthText.textContent = "Weak Password 😟";
        strengthText.style.color = "#ff6b6b";
    } else if (strength === "medium") {
        strengthText.textContent = "Medium Password 😐";
        strengthText.style.color = "#facc15";
    } else if (strength === "strong") {
        strengthText.textContent = "Strong Password 😄";
        strengthText.style.color = "#4ade80";
    } else {
        strengthText.textContent = "";
    }

    clearTimeout(typingTimer);

    typingTimer = setTimeout(() => {
        // Idle → monkey opens eyes
        icon.textContent = "🐵";
    }, doneTypingInterval);
});

/* Autofocus */
window.onload = () => {
    document.getElementById("username").focus();

    const params = new URLSearchParams(window.location.search);
    if(params.has("error")){
        document.getElementById("card").classList.add("shake");
    }
};

/* Particles */
particlesJS("particles-js", {
    particles: {
        number: { value: 60 },
        size: { value: 3 },
        move: { speed: 2 }
    }
});
</script>

</body>
</html>
